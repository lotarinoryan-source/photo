<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Photo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f0f0f0;
    text-align:center;
    padding:40px;
}

.container{
    background:white;
    padding:20px;
    width:400px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

img{
    width:250px;
    border-radius:10px;
    border:3px solid #007BFF;
}

h2{
    color:#333;
}
</style>
</head>

<body>

<div class="container">
    <h2>My Photo</h2>

    <!-- Your photo -->
    <img src="photo.jpg" alt="My Photo">

    <p>Welcome to my webpage!</p>
</div>

</body>
</html>
